<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>备忘录</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
</head>
<body>

    <div id="app">

        <!-- ===== 列表视图 ===== -->
        <div id="listView" class="view active">
            <div class="status-bar"></div>
            <div class="header">
                <h1>備忘錄</h1>
                <div class="header-actions">
                    <button id="btnNewNote" aria-label="新增備忘錄">
                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
            </div>
            <div class="search-bar">
                <input id="searchInput" type="text" placeholder="搜尋" />
            </div>
            <div class="note-list" id="noteList"></div>
        </div>

        <!-- ===== 编辑器视图 ===== -->
        <div id="editorView" class="view slide-in">
            <div class="status-bar"></div>
            <div class="editor-header">
                <button class="back-btn" id="btnBack">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    返回
                </button>
                <div class="actions">
                    <button id="btnInsertImage" aria-label="插入圖片">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                    </button>
                    <button id="btnExportImage" aria-label="匯出長圖">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                    <button id="btnDeleteNote" aria-label="刪除">
                        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>
            </div>

            <div class="editor-scroll" id="editorScroll">
                <input class="editor-title" id="editorTitle" placeholder="標題" />
                <input class="editor-sub" id="editorSub" placeholder="副標題" />
                <div class="editor-body" id="editorBody" contenteditable="true"></div>
            </div>

            <!-- 格式工具栏 -->
            <div class="format-toolbar" id="formatToolbar">
                <div class="group">
                    <button data-cmd="bold" title="粗體"><svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
                    <button data-cmd="italic" title="斜體"><svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
                    <button data-cmd="underline" title="底線"><svg viewBox="0 0 24 24"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
                    <button data-cmd="strikeThrough" title="刪除線"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><path d="M16 6.5A4 4 0 0 0 12 4a4 4 0 0 0-4 4c0 2 1.5 3.5 4 4"/><path d="M8 17.5A4 4 0 0 0 12 20a4 4 0 0 0 4-4c0-2-1.5-3.5-4-4"/></svg></button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="formatBlock" data-value="h1" title="標題1">H1</button>
                    <button data-cmd="formatBlock" data-value="h2" title="標題2">H2</button>
                    <button data-cmd="formatBlock" data-value="h3" title="標題3">H3</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="insertUnorderedList" title="項目符號"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
                    <button data-cmd="insertOrderedList" title="編號"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
                    <button data-cmd="formatBlock" data-value="blockquote" title="引用"><svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.5-2-3-1.244-.5-3.5-.5-4 0-.5.5-.5 2 0 3 1 0 2.5-.5 3 1v9c0 5-2 6-4 6z"/><path d="M14 21c3 0 7-1 7-8V5c0-1.25-.756-2.5-2-3-1.244-.5-3.5-.5-4 0-.5.5-.5 2 0 3 1 0 2.5-.5 3 1v9c0 5-2 6-4 6z"/></svg></button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="removeFormat" title="清除格式"><svg viewBox="0 0 24 24"><path d="M12.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-7.5-7z"/><path d="M12 2v7h7"/><path d="m9 14 6 4"/><path d="m15 14-6 4"/></svg></button>
                    <div class="color-picker-wrap">
                        <input type="color" id="textColorPicker" value="#1c1c1e" title="文字顏色" />
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 模态框 ===== -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-box">
                <h3 id="modalTitle">匯出長圖</h3>
                <p id="modalDesc">將這篇備忘錄匯出為一張長圖，分享或儲存。</p>
                <div class="actions">
                    <button class="btn-cancel" id="modalCancel">取消</button>
                    <button class="btn-confirm" id="modalConfirm">確認匯出</button>
                </div>
            </div>
        </div>

        <!-- ===== Toast ===== -->
        <div class="toast" id="toast"></div>

        <!-- ===== 隐藏元素 ===== -->
        <input type="file" id="imageInput" accept="image/*" multiple />
        <div id="exportContainer"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
