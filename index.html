<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Notes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="備忘錄">
  <!-- 引入 html2canvas 用於導出長圖 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

  <!-- 1. 清單頁面 (List View) -->
  <div id="list-view" class="view active">
    <header class="ios-header">
      <div class="header-top">
        <span class="back-btn-placeholder"></span>
        <span class="header-title">備忘錄</span>
        <button id="import-export-btn" class="ios-icon-btn">⚙️</button>
      </div>
      <div class="search-bar-container">
        <input type="text" id="search-input" placeholder="搜尋">
      </div>
    </header>

    <main class="note-list-container">
      <div class="folder-title">所有備忘錄</div>
      <div id="notes-list" class="ios-list">
        <!-- 備忘錄列表項目會由 JS 動態生成 -->
      </div>
    </main>

    <footer class="ios-footer">
      <span id="note-count">0 個備忘錄</span>
      <button id="new-note-btn" class="ios-icon-btn">📝</button>
    </footer>
  </div>

  <!-- 2. 編輯頁面 (Editor View) -->
  <div id="editor-view" class="view">
    <header class="ios-header-editor">
      <button id="back-to-list" class="ios-back-btn">
        <span class="chevron"></span> 備忘錄
      </button>
      <div class="editor-actions">
        <button id="share-btn" class="ios-icon-btn">📤</button>
        <button id="format-btn" class="ios-icon-btn">Aa</button>
        <button id="insert-img-btn" class="ios-icon-btn">📷</button>
        <input type="file" id="image-loader" accept="image/*" style="display: none;">
        <button id="delete-note-btn" class="ios-icon-btn trash">🗑️</button>
      </div>
    </header>

    <!-- 編輯區域 (導出長圖時會擷取此區塊) -->
    <main id="note-editor-container" class="editor-container">
      <div class="note-date" id="note-timestamp">2026年7月16日 19:57</div>
      <div id="editor" contenteditable="true" placeholder="開始輸入..."></div>
    </main>
  </div>

  <!-- 3. iOS 格式化工具列 (Format Sheet) -->
  <div id="format-sheet" class="ios-sheet">
    <div class="sheet-header">
      <h3>格式</h3>
      <button id="close-format" class="close-btn">完成</button>
    </div>
    <div class="format-options">
      <button class="format-style-btn" data-command="formatBlock" data-value="h1">標題</button>
      <button class="format-style-btn" data-command="formatBlock" data-value="h2">子標題</button>
      <button class="format-style-btn" data-command="formatBlock" data-value="p">內文</button>
      <hr class="sheet-divider">
      <div class="inline-formats">
        <button class="format-inline-btn" data-command="bold"><b>B</b></button>
        <button class="format-inline-btn" data-command="italic"><i>I</i></button>
        <button class="format-inline-btn" data-command="underline"><u>U</u></button>
        <button class="format-inline-btn" data-command="strikeThrough"><s>S</s></button>
      </div>
    </div>
  </div>

  <!-- 4. iOS 導出/導入選單 (Settings Sheet) -->
  <div id="settings-sheet" class="ios-sheet">
    <div class="sheet-header">
      <h3>備忘錄數據管理</h3>
      <button id="close-settings" class="close-btn">完成</button>
    </div>
    <div class="settings-options">
      <button id="export-data-btn" class="settings-action-btn">📤 導出備忘錄備份 (JSON)</button>
      <button id="trigger-import-btn" class="settings-action-btn">📥 導入備忘錄備份 (JSON)</button>
      <input type="file" id="import-file-input" accept=".json" style="display: none;">
    </div>
  </div>

  <!-- 5. iOS 分享/導出長圖選單 (Share Sheet) -->
  <div id="share-sheet" class="ios-sheet">
    <div class="sheet-header">
      <h3>分享備忘錄</h3>
      <button id="close-share" class="close-btn">完成</button>
    </div>
    <div class="settings-options">
      <button id="export-long-img-btn" class="settings-action-btn primary">🖼️ 導出長圖 (PNG)</button>
    </div>
  </div>

  <!-- 背景遮罩 -->
  <div id="overlay" class="ios-overlay"></div>

  <script src="app.js"></script>
  <script>
    // 註冊 PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
